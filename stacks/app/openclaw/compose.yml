# =============================================================================
# Openclaw — personal AI assistant with a web Control UI
# =============================================================================
#
# Beginner-first: everything is done in the browser, no terminal.
#
#   1. bento exposes the Control UI via Traefik at https://${OPENCLAW_HOST}
#      (single router → container port 18789; the WebSocket upgrade is
#      proxied natively). The gateway token gates the WS handshake.
#   2. The operator signs in to a provider straight from the UI — "sign in
#      with ChatGPT" / "sign in with Claude" uses their SUBSCRIPTION via
#      OAuth (no API key, flat fee). The OAuth profile persists in the
#      openclaw-oauth volume. The CLI login (`openclaw models auth login`)
#      needs an interactive TTY and fails over SSH, so the Control UI is the
#      only terminal-free path — which is why bento exposes it.
#   3. Channels: Telegram is the easy default — create a bot with @BotFather
#      and paste the token (TELEGRAM_BOT_TOKEN below, or in the Control UI).
#      No Meta business verification, unlike WhatsApp.
#
# Two overlay surfaces are exposed for consumers on network_public:
#   - The Gateway WS protocol (`ws://openclaw:18789`) — this is what
#     paperclip's openclaw_gateway adapter speaks. It invokes openclaw's full
#     agent runtime (agentic loop, tools, shell, plugins, the configured
#     model/subscription) and streams `event agent` frames back, with
#     persistent sessions and Ed25519 device pairing. NOT a dumb completions
#     proxy — the agent's tools execute here, in the openclaw container.
#   - The OpenAI-compatible /v1/chat/completions endpoint — a separate, plain
#     inference shim (no agent loop) for generic OpenAI-API consumers.
# install.sh writes the JSON5 that enables the Control UI and /v1 (no upstream
# env equivalent for those flags) and pins controlUi.allowedOrigins to the
# public host so the browser WS upgrade is accepted.
#
# Gotcha: `host.docker.internal` is broken under Swarm overlay. If you point
# Openclaw at a local LM Studio / Ollama, use the VPS host's private IP or a
# Tailscale endpoint instead.
# =============================================================================

services:
  openclaw:
    # Tag overridable per-deploy via OPENCLAW_IMAGE_TAG (same convention as
    # hermes/paperclip).
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_IMAGE_TAG:-latest}
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # The upstream image ships a HEALTHCHECK that does
    # `fetch('http://127.0.0.1:18789/healthz')`, but bento binds the gateway
    # to `lan` (OPENCLAW_GATEWAY_BIND) so the overlay — Traefik and
    # paperclip — can reach it. With a non-loopback bind the loopback probe
    # times out, the task never goes healthy, Swarm wedges it at 0/1, and
    # Traefik never registers the route (so no TLS cert is ever requested).
    # Per bento convention app services carry no Swarm healthcheck — Traefik's
    # backend HTTP probe handles readiness — so disable the image one.
    healthcheck:
      disable: true
    volumes:
      # Three separate volumes — OAuth secret dir MUST live outside the
      # data dir per upstream guidance (different encryption lifecycle).
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
      - openclaw-oauth:/home/node/.config/openclaw
    environment:
      # =============================================================================
      # Gateway — authentication & bind
      # =============================================================================

      # Shared secret that gates BOTH the Control UI's WebSocket handshake and
      # the OpenAI-compatible /v1 bearer. A non-loopback bind (below) makes auth
      # mandatory — openclaw refuses to expose the gateway without it.
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}

      # Bind on all LAN interfaces so the overlay (Traefik + paperclip) can
      # reach the gateway. `loopback` would shadow it from sibling containers.
      - OPENCLAW_GATEWAY_BIND=lan

      # =============================================================================
      # State directories (each backed by a named volume below)
      # =============================================================================

      # SQLite + JSON5 config + workspace tree.
      - OPENCLAW_CONFIG_DIR=/home/node/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/home/node/.openclaw/workspace
      # OAuth profile secrets live on a SEPARATE volume from the data dir per
      # upstream guidance (different encryption lifecycle). This is where the
      # "sign in with ChatGPT/Claude" subscription tokens persist across deploys.
      - OPENCLAW_AUTH_PROFILE_SECRET_DIR=/home/node/.config/openclaw

      # =============================================================================
      # Timezone
      # =============================================================================

      # Process + log timestamps. Match the rest of the bento fleet.
      - TZ=America/Sao_Paulo

      # =============================================================================
      # LLM provider — the primary path is the Control UI, not these vars
      # =============================================================================
      # Recommended (terminal-free): open the Control UI and "sign in with
      # ChatGPT / Claude" — it uses your SUBSCRIPTION via OAuth (no API key,
      # flat fee) and persists on the openclaw-oauth volume. The pay-as-you-go
      # API keys below are an ADVANCED bring-your-own alternative: uncomment one
      # and redeploy (openclaw reads it as that provider's default-account key).

      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # =============================================================================
      # Chat channels — Telegram is the easy beginner default
      # =============================================================================
      # Telegram needs only a bot token from @BotFather — no Meta business
      # verification or WhatsApp Business API approval. It has no in-UI login
      # button (unlike QR-paired channels): the token comes from this env var
      # (the default-account fallback) and install.sh flips
      # channels.telegram.enabled on when it is set. Leave blank to skip — you
      # can add it later from the Control UI's config editor
      # (channels.telegram.botToken + enabled).
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}

      # Slack / Discord: bring your own tokens, then enable the channel in the
      # Control UI config editor (channels.<name>.enabled).
      # - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      # - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      # - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.openclaw.rule=Host(`${OPENCLAW_HOST}`)
        - traefik.http.routers.openclaw.entrypoints=websecure
        - traefik.http.routers.openclaw.tls.certresolver=letsencryptresolver
        - traefik.http.routers.openclaw.priority=2
        - traefik.http.routers.openclaw.service=openclaw
        - traefik.http.services.openclaw.loadbalancer.server.port=18789
        - traefik.http.services.openclaw.loadbalancer.passHostHeader=true
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=openclaw
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}

volumes:
  openclaw-config:
    driver: local
  openclaw-workspace:
    driver: local
  openclaw-oauth:
    driver: local

networks:
  network_public:
    external: true
    name: network_public
