x-n8n-common: &n8n-common
  image: n8nio/n8n:latest
  networks:
    - network_public
  environment:
    # =============================================================================
    # Core Application
    # =============================================================================

    # Encryption key used to secure credentials in the database.
    # MUST remain stable across restarts/upgrades.
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

    # Runtime environment.
    - NODE_ENV=production

    # =============================================================================
    # Observability / Monitoring / Logging
    # =============================================================================

    # Enable Prometheus metrics endpoint.
    - N8N_METRICS=true

    # Disable anonymous telemetry sent to n8n.
    - N8N_DIAGNOSTICS_ENABLED=false

    # Maximum accepted payload size in MB.
    - N8N_PAYLOAD_SIZE_MAX=16

    # Logging level: error | warn | info | debug
    - N8N_LOG_LEVEL=info

    # =============================================================================
    # Timezone
    # =============================================================================

    # n8n internal timezone.
    - GENERIC_TIMEZONE=America/Sao_Paulo

    # Linux/Node.js process timezone.
    - TZ=America/Sao_Paulo

    # =============================================================================
    # Database (PostgreSQL)
    # =============================================================================

    # Database type.
    - DB_TYPE=postgresdb

    # PostgreSQL connection settings.
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=n8n
    - DB_POSTGRESDB_USER=postgres
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}

    # =============================================================================
    # Public URLs / Reverse Proxy / Webhooks
    # =============================================================================

    # Internal application port.
    - N8N_PORT=5678

    # Public editor hostname.
    - N8N_HOST=${N8N_HOST}

    # Public editor URL used for OAuth callbacks and links.
    # Avoid trailing slash.
    - N8N_EDITOR_BASE_URL=https://${N8N_HOST}

    # Public protocol.
    - N8N_PROTOCOL=https

    # Public webhook base URL.
    # Avoid trailing slash.
    - WEBHOOK_URL=https://${N8N_WEBHOOK_HOST}

    # Webhook endpoint path.
    - N8N_ENDPOINT_WEBHOOK=webhook

    # =============================================================================
    # Queue Mode / Redis / Horizontal Scaling
    # =============================================================================

    # Enable queue execution mode.
    - EXECUTIONS_MODE=queue

    # Enable worker health endpoints (/healthz).
    - QUEUE_HEALTH_CHECK_ACTIVE=true

    # Redis queue backend.
    - QUEUE_BULL_REDIS_HOST=redis
    - QUEUE_BULL_REDIS_PORT=6379
    - QUEUE_BULL_REDIS_DB=1

    # Optional Redis authentication.
    # Strongly recommended in production.
    # - QUEUE_BULL_REDIS_PASSWORD=secret

    # =============================================================================
    # Execution Control / Timeouts
    # =============================================================================

    # Default workflow timeout in seconds.
    - EXECUTIONS_TIMEOUT=3600

    # Maximum allowed timeout override in seconds.
    - EXECUTIONS_TIMEOUT_MAX=7200

    # Graceful shutdown timeout for workers.
    - N8N_GRACEFUL_SHUTDOWN_TIMEOUT=60

    # =============================================================================
    # UI / Product Features
    # =============================================================================

    # Enable version update notifications.
    - N8N_VERSION_NOTIFICATIONS_ENABLED=true

    # Enable workflow templates browser.
    - N8N_TEMPLATES_ENABLED=true

    # Disable onboarding/tutorial flow.
    - N8N_ONBOARDING_FLOW_DISABLED=true

    # Enable workflow tags feature.
    - N8N_WORKFLOW_TAGS_DISABLED=false

    # Show usage/settings page.
    - N8N_HIDE_USAGE_PAGE=false

    # Enable public REST API.
    - N8N_PUBLIC_API_DISABLED=false

    # =============================================================================
    # Execution Persistence / Pruning
    # =============================================================================

    # Automatically prune old execution data.
    - EXECUTIONS_DATA_PRUNE=true

    # Maximum execution retention age in hours.
    # 336h = 14 days.
    - EXECUTIONS_DATA_MAX_AGE=336

    # Hard delete interval in minutes.
    - EXECUTIONS_DATA_PRUNE_HARD_DELETE_INTERVAL=15

    # Soft delete interval in minutes.
    - EXECUTIONS_DATA_PRUNE_SOFT_DELETE_INTERVAL=60

    # Maximum number of stored executions.
    - EXECUTIONS_DATA_PRUNE_MAX_COUNT=10000

    # Save failed executions.
    - EXECUTIONS_DATA_SAVE_ON_ERROR=all

    # Do not save successful executions.
    - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none

    # Save partial progress data.
    - EXECUTIONS_DATA_SAVE_ON_PROGRESS=true

    # Save manual execution history.
    - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true

    # =============================================================================
    # Code Node / Sandbox / Community Packages
    # =============================================================================

    # Allowed built-in Node.js modules inside Code node.
    - NODE_FUNCTION_ALLOW_BUILTIN=crypto,path,util

    # Allowed external npm packages inside Code node.
    - NODE_FUNCTION_ALLOW_EXTERNAL=luxon,axios,moment

    # Allow community packages to expose tools.
    - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true

    # Prevent automatic reinstall of missing packages.
    - N8N_REINSTALL_MISSING_PACKAGES=false

    # Block environment variable access from runners/code execution.
    - N8N_BLOCK_RUNNER_ENV_ACCESS=true

    # =============================================================================
    # Task Runners / Workers
    # =============================================================================

    # Runner memory limit (MB).
    - N8N_RUNNERS_MAX_OLD_SPACE_SIZE=512

    # Offload manual executions to workers instead of main process.
    - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true

    # =============================================================================
    # Security / Hardening
    # =============================================================================

    # Enforce strict permissions on .n8n settings files.
    - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true

    # =============================================================================
    # Binary Data Storage
    # =============================================================================

    # Recommended for queue mode + large binary workflows.
    # Use S3-compatible object storage instead of local filesystem.
    # - N8N_DEFAULT_BINARY_DATA_MODE=s3

    # =============================================================================
    # Email (SMTP)
    # =============================================================================

    # -----------------------------------------------------------------------------
    # AWS SES
    # -----------------------------------------------------------------------------

    # - N8N_EMAIL_MODE=smtp
    # - N8N_SMTP_HOST=email-smtp.us-east-1.amazonaws.com
    # - N8N_SMTP_PORT=587
    # - N8N_SMTP_USER=user
    # - N8N_SMTP_PASS=secret
    # - N8N_SMTP_SENDER=no-reply@website.com
    # - N8N_SMTP_SSL=true

    # -----------------------------------------------------------------------------
    # SendGrid SMTP
    # -----------------------------------------------------------------------------

    # - N8N_EMAIL_MODE=smtp
    # - N8N_SMTP_HOST=smtp.sendgrid.net
    # - N8N_SMTP_PORT=587
    # - N8N_SMTP_USER=user
    # - N8N_SMTP_PASS=secret
    # - N8N_SMTP_SENDER=no-reply@website.com
    # - N8N_SMTP_SSL=true
  deploy: &n8n-deploy
    mode: replicated
    replicas: 1
    placement:
      constraints:
        - node.role == manager
    update_config:
      parallelism: 1
      delay: 30s
      order: start-first
      failure_action: rollback

services:
  n8n_editor:
    <<: *n8n-common
    command: start
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5678/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      <<: *n8n-deploy
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.n8n_editor.rule=Host(`${N8N_HOST}`)
        - traefik.http.routers.n8n_editor.entrypoints=websecure
        - traefik.http.routers.n8n_editor.tls.certresolver=letsencryptresolver
        - traefik.http.routers.n8n_editor.priority=2
        - traefik.http.routers.n8n_editor.service=n8n_editor
        - traefik.http.services.n8n_editor.loadbalancer.server.port=5678
        - traefik.http.services.n8n_editor.loadbalancer.passHostHeader=true

  n8n_webhook:
    <<: *n8n-common
    entrypoint: ["sh", "-c"]
    command:
      - |
        until wget -qO- http://n8n_editor:5678/healthz 2>/dev/null; do sleep 3; done
        exec /docker-entrypoint.sh webhook
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5678/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      <<: *n8n-deploy
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.n8n_webhook.rule=Host(`${N8N_WEBHOOK_HOST}`)
        - traefik.http.routers.n8n_webhook.entrypoints=websecure
        - traefik.http.routers.n8n_webhook.tls.certresolver=letsencryptresolver
        - traefik.http.routers.n8n_webhook.priority=2
        - traefik.http.routers.n8n_webhook.service=n8n_webhook
        - traefik.http.services.n8n_webhook.loadbalancer.server.port=5678
        - traefik.http.services.n8n_webhook.loadbalancer.passHostHeader=true

  n8n_worker:
    <<: *n8n-common
    entrypoint: ["sh", "-c"]
    command:
      - |
        until wget -qO- http://n8n_editor:5678/healthz 2>/dev/null; do sleep 3; done
        exec /docker-entrypoint.sh worker --concurrency=10
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5678/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      <<: *n8n-deploy
      resources:
        limits:
          cpus: "1"
          memory: 768M

networks:
  network_public:
    name: network_public
    external: true
volumes:
  n8n-data:
    driver: local
