x-paperclip-common: &paperclip-common
  # Stock upstream image. CLIs already shipped: claude, codex, opencode.
  # To add hermes / gemini / pi / grok, do it inside the running container
  # with `docker exec`, or fork this stack to extend the image.
  image: ghcr.io/paperclipai/paperclip:latest
  networks:
    - network_public
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  environment:
    # =============================================================================
    # Core Application
    # =============================================================================

    - HOST=0.0.0.0
    - PAPERCLIP_HOME=/paperclip
    - PAPERCLIP_INSTANCE_ID=production
    - NODE_ENV=production
    # Upstream's prod docker-compose.yml sets this; without it paperclip's
    # server starts in API-only mode and the web UI is unreachable.
    - SERVE_UI=true

    # =============================================================================
    # Public URL / Reverse Proxy
    # =============================================================================

    - PAPERCLIP_PUBLIC_URL=https://${PAPERCLIP_HOST}
    - PAPERCLIP_DEPLOYMENT_MODE=authenticated
    # `public` because bento exposes paperclip on the public internet
    # via Traefik + Let's Encrypt. Upstream's `private` exposure is for
    # LAN/VPN/Tailscale-only paperclips and intentionally disables the
    # high-entropy invite path that public deploys depend on.
    - PAPERCLIP_DEPLOYMENT_EXPOSURE=public

    # =============================================================================
    # Authentication / Security
    # =============================================================================

    # Generated by bento's manifest with `openssl rand -hex 32`.
    - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}

    # Public signup stays OPEN by default. paperclip's Better Auth
    # gate (`disableSignUp` in `server/src/auth/better-auth.ts`)
    # blocks ALL signups when true — including bootstrap-ceo
    # first-admin claims AND admin-minted company invites, since
    # they all hit /api/auth/sign-up/email. Closing it permanently
    # would brick the invite flow whenever you want to add a teammate.
    #
    # The value is templated so it surfaces in Portainer's friendly
    # env panel — when you want to lock signup after onboarding:
    #
    #   Portainer -> Stacks -> paperclip -> Environment variables
    #   -> set PAPERCLIP_AUTH_DISABLE_SIGN_UP to "true"
    #   -> Update the stack
    #
    # Flip back to "false" before sending the next invite. Caveat:
    # a bento Step 3 fresh deploy (after orphan-clean / docker stack rm
    # path) resets state.envs.paperclip from the manifest default, so
    # a "true" you set in Portainer is lost across that path. Regular
    # Update -> Re-deploy stacks preserves it.
    - PAPERCLIP_AUTH_DISABLE_SIGN_UP=${PAPERCLIP_AUTH_DISABLE_SIGN_UP:-false}

    # =============================================================================
    # Database / Storage
    # =============================================================================

    # Bento's shared postgres stack. Without DATABASE_URL set, paperclip
    # falls back to an embedded postgres on port 54329 inside the container
    # — fine for dev, wasteful in production. The 'paperclip' database is
    # created by this stack's install.sh (ensure_database paperclip).
    - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/paperclip

    # =============================================================================
    # Timezone
    # =============================================================================

    - TZ=America/Sao_Paulo

    # =============================================================================
    # Logging
    # =============================================================================

    - LOG_LEVEL=info

    # =============================================================================
    # AI Providers (operator-supplied at day-2 via Portainer)
    # =============================================================================
    #
    # Bento ships paperclip with no API keys baked in. Add the ones you
    # want via Portainer:
    #
    #   Stacks -> paperclip -> Editor -> add an env var -> Update the stack
    #
    # Paperclip's server doesn't call LLMs itself — it spawns CLIs that
    # do. The env vars below are what those CLIs read:
    #
    #   OPENAI_API_KEY      -> codex CLI (bundled in image)
    #   ANTHROPIC_API_KEY   -> claude CLI (bundled in image)
    #   OPENROUTER_API_KEY  -> opencode CLI multi-provider (bundled in image)
    #   GEMINI_API_KEY      -> gemini CLI (requires `docker exec npm install -g @google/gemini-cli`)
    #
    # -----------------------------------------------------------------------------
    # OpenAI-compatible base URL override (Z.ai, Groq, DeepSeek, …)
    # -----------------------------------------------------------------------------
    #
    # Paperclip's bundled `codex` CLI is OpenAI-compatible. Override the
    # base URL to point at any provider that speaks OpenAI's API. Only one
    # at a time — codex has a single OPENAI_BASE_URL slot.
    #
    # Z.ai / GLM — cheap subscription with the GLM-4.6 coding model.
    #   Use the subscription/coding endpoint:
    #     https://api.z.ai/api/coding/paas/v4
    #   Do NOT use the generic endpoint:
    #     https://api.z.ai/api/paas/v4
    #
    #   OPENAI_API_KEY=<your z.ai key>
    #   OPENAI_BASE_URL=https://api.z.ai/api/coding/paas/v4
    #
    # Groq — Llama 3 / Mixtral, ultra-fast, generous free tier.
    #   OPENAI_API_KEY=<your groq key>
    #   OPENAI_BASE_URL=https://api.groq.com/openai/v1
    #
    # DeepSeek — DeepSeek-V3 / R1, very cheap per token.
    #   OPENAI_API_KEY=<your deepseek key>
    #   OPENAI_BASE_URL=https://api.deepseek.com/v1
    #
    # xAI Grok.
    #   OPENAI_API_KEY=<your xai key>
    #   OPENAI_BASE_URL=https://api.x.ai/v1
    #
    # -----------------------------------------------------------------------------
    # Bento-native overlay integrations
    # -----------------------------------------------------------------------------
    #
    # Paperclip's `http` adapter and `openclaw_gateway` adapter take their
    # URL from per-agent UI config — there's nothing to set here. If you
    # have these companion stacks deployed on the same Swarm, the URLs to
    # paste into Paperclip's UI when creating an agent are:
    #
    #   paperclip-runs (recommended bridge — queue + retry + backpressure):
    #     adapter: http
    #     URL:     http://paperclip_runs_api:8787/paperclip/execute
    #     token:   jq -r '.envs."paperclip-runs".BRIDGE_TOKEN' ~/.config/bento/state.json
    #
    #   openclaw (direct, no queue):
    #     adapter: openclaw_gateway
    #     URL:     ws://openclaw:18789
    #
    #   hermes (requires the npm adapter installed inside paperclip):
    #     docker exec -it <paperclip-container> npm install -g hermes-paperclip-adapter

  deploy: &paperclip-deploy
    mode: replicated
    replicas: 1
    placement:
      constraints:
        - node.role == manager
    update_config:
      parallelism: 1
      delay: 30s
      order: stop-first
      failure_action: rollback
    restart_policy:
      condition: on-failure
      delay: 10s
      max_attempts: 5
      window: 120s

services:
  paperclip:
    <<: *paperclip-common
    # Wait for postgres to accept TCP before launching the node server.
    # Swarm does NOT honor the `depends_on: condition: service_healthy`
    # form that the upstream docker-compose.yml uses — only the basic
    # list form, which guarantees start order but not readiness. Without
    # this wrapper, paperclip races against postgres on stack create
    # and crashes with `getaddrinfo ENOTFOUND postgres` (Swarm DNS not
    # propagated yet) or `ECONNREFUSED` (postgres still in initdb).
    # restart_policy below would eventually pull it back up, but the
    # operator sees a 10-30s gap of Failed→Running in the task history
    # and a crash log on first deploy.
    #
    # Bash's `/dev/tcp/host/port` built-in opens an actual TCP socket
    # without needing `nc` or `pg_isready` installed in the image. The
    # `command:` here REPLACES the image's CMD, then exec's the same
    # `node …` invocation the upstream Dockerfile shipped — verified
    # via `docker inspect` against ghcr.io/paperclipai/paperclip:latest.
    # `entrypoint:` stays untouched so the image's docker-entrypoint.sh
    # still runs (UID/GID remap + chown + drop to the node user via
    # gosu); this command becomes `gosu node bash -c '…'`.
    command:
      - bash
      - -c
      - |
        elapsed=0
        until echo > /dev/tcp/postgres/5432 2>/dev/null; do
          if (( elapsed >= 60 )); then
            echo "[bento] postgres unreachable at postgres:5432 after 60s — exiting so Swarm can restart" >&2
            exit 1
          fi
          echo "[bento] waiting for postgres tcp 5432..."
          sleep 2
          elapsed=$$((elapsed + 2))
        done
        echo "[bento] postgres reachable, launching paperclip"
        exec node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
    volumes:
      - paperclip-data:/paperclip
    # Swarm healthcheck omitted — paperclip's boot bundles a Python venv
    # warmup that occasionally exceeds the probe window. The Dockerfile
    # still ships a HEALTHCHECK so `docker run` standalone gets one;
    # Swarm just won't enforce it.
    deploy:
      <<: *paperclip-deploy
      resources:
        limits:
          cpus: "1"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.paperclip.rule=Host(`${PAPERCLIP_HOST}`)
        - traefik.http.routers.paperclip.entrypoints=websecure
        - traefik.http.routers.paperclip.tls.certresolver=letsencryptresolver
        - traefik.http.routers.paperclip.priority=2
        - traefik.http.routers.paperclip.service=paperclip
        - traefik.http.services.paperclip.loadbalancer.server.port=3100
        - traefik.http.services.paperclip.loadbalancer.passHostHeader=true
        - traefik.http.routers.paperclip.middlewares=paperclip-headers
        - traefik.http.middlewares.paperclip-headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.paperclip-headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.paperclip-headers.headers.stsPreload=true
        - traefik.http.middlewares.paperclip-headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.paperclip-headers.headers.browserXssFilter=true
        - traefik.http.middlewares.paperclip-headers.headers.referrerPolicy=no-referrer-when-downgrade

networks:
  network_public:
    name: network_public
    external: true

volumes:
  paperclip-data:
    driver: local
