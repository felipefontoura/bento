services:
  cli_proxy_api:
    image: eceasy/cli-proxy-api:latest
    # printf avoids the YAML-indent landmine that bit us when seeding
    # config.yaml via a heredoc: the leading spaces of the heredoc body
    # leaked into the file, making `server.port` un-parseable and the
    # API server fell back to a random port (logged as `:0`).
    # Upstream's config.yaml uses a flat `port: 8317` at the root, not a
    # nested `server.port` — using the wrong shape silently fell back to
    # an ephemeral port ("API server started successfully on: :0") and
    # the wget healthcheck on 8317 had nothing to talk to.
    command:
      - sh
      - -c
      - |
        mkdir -p /CLIProxyAPI/config
        [ -f /CLIProxyAPI/config/config.yaml ] \
          || printf 'port: 8317\n' > /CLIProxyAPI/config/config.yaml
        exec ./CLIProxyAPI --config /CLIProxyAPI/config/config.yaml
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - cli_proxy_api_config:/CLIProxyAPI/config
      - cli_proxy_api_auth:/root/.cli-proxy-api
    environment:
      - TZ=America/Sao_Paulo
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8317/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
volumes:
  cli_proxy_api_config:
    driver: local
  cli_proxy_api_auth:
    driver: local

networks:
  network_public:
    external: true
    name: network_public
