x-chatwoot-common: &chatwoot-common
  image: chatwoot/chatwoot:latest
  volumes:
    - chatwoot_data:/app/storage
    # Cache installed gems across restarts so the rails.sh entrypoint's
    # `bundle install` is a no-op after the first boot (turns a ~5min
    # cold start into ~30s).
    - chatwoot_gems:/gems
  networks:
    - network_public
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  environment:
    # =============================================================================
    # Core Application
    # =============================================================================

    # Human-readable installation name.
    - INSTALLATION_NAME=chatwoot

    # Deployment environment identifier.
    - INSTALLATION_ENV=docker

    # Node.js runtime environment.
    - NODE_ENV=production

    # Rails runtime environment.
    - RAILS_ENV=production

    # Redirect logs to stdout for container-friendly logging.
    - RAILS_LOG_TO_STDOUT=true

    # Log verbosity: debug | info | warn | error.
    - LOG_LEVEL=debug

    # Rack timeout per request (seconds).
    - RACK_TIMEOUT_SERVICE_TIMEOUT=600

    # =============================================================================
    # Security
    # =============================================================================

    # Rails secret key base. MUST remain stable across restarts/upgrades.
    - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY_BASE}

    # Force HTTPS redirects.
    - FORCE_SSL=true

    # =============================================================================
    # Public URL / Reverse Proxy
    # =============================================================================

    # Public-facing URL used for links and callbacks.
    - FRONTEND_URL=https://${CHATWOOT_HOST}

    # =============================================================================
    # Localization
    # =============================================================================

    # Default language for the UI.
    - DEFAULT_LOCALE=en

    # =============================================================================
    # Account Management
    # =============================================================================

    # Disable public account signups.
    # Invited users are still able to sign up.
    - ENABLE_ACCOUNT_SIGNUP=false

    # =============================================================================
    # Database (PostgreSQL)
    # =============================================================================

    # PostgreSQL host.
    - POSTGRES_HOST=postgres

    # Database name.
    - POSTGRES_DATABASE=chatwoot

    # Database user.
    - POSTGRES_USERNAME=postgres

    # Database password.
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    # =============================================================================
    # Cache / Queue (Redis)
    # =============================================================================

    # Redis connection URL (DB index 3).
    - REDIS_URL=redis://redis:6379/3

    # =============================================================================
    # Storage (AWS S3)
    # =============================================================================

    # - ACTIVE_STORAGE_SERVICE=amazon
    # - AWS_REGION=us-east-1
    # - AWS_ACCESS_KEY_ID=your-access-key-id
    # - AWS_SECRET_ACCESS_KEY=your-secret-access-key
    # - S3_BUCKET_NAME=chatwoot-uploads

    # =============================================================================
    # Email (SMTP)
    # =============================================================================

    # Sender display name and email address.
    # - MAILER_SENDER_EMAIL=Support <help@website.com>

    # ---------------------------------------------------------------------------
    # AWS SES
    # ---------------------------------------------------------------------------

    # - SMTP_ADDRESS=email-smtp.us-east-1.amazonaws.com
    # - SMTP_AUTHENTICATION=plain
    # - SMTP_DOMAIN=website.com
    # - SMTP_ENABLE_STARTTLS_AUTO=true
    # - SMTP_PORT=587
    # - SMTP_USERNAME=apikey
    # - SMTP_PASSWORD=your-secret-access-key

    # ---------------------------------------------------------------------------
    # SendGrid
    # ---------------------------------------------------------------------------

    # - SMTP_ADDRESS=smtp.sendgrid.net
    # - SMTP_AUTHENTICATION=plain
    # - SMTP_DOMAIN=website.com
    # - SMTP_ENABLE_STARTTLS_AUTO=true
    # - SMTP_PORT=587
    # - SMTP_USERNAME=apikey
    # - SMTP_PASSWORD=your-sendgrid-api-key

    # =============================================================================
    # Bot / Widget Appearance
    # =============================================================================

    # Use the inbox avatar for the bot avatar in the widget.
    - USE_INBOX_AVATAR_FOR_BOT=true

    # =============================================================================
    # Performance
    # =============================================================================

    # Number of Puma worker processes.
    - WEB_CONCURRENCY=2

    # Sidekiq thread concurrency.
    - SIDEKIQ_CONCURRENCY=10

    # =============================================================================
    # Rate Limiting
    # =============================================================================

    # - ENABLE_RACK_ATTACK=true
    # - RACK_ATTACK_LIMIT=3000
  deploy: &chatwoot-deploy
    mode: replicated
    replicas: 1
    placement:
      constraints:
        - node.role == manager
    resources:
      limits:
        cpus: "${CHATWOOT_CPU_LIMIT:-1}"
        memory: ${CHATWOOT_MEM_LIMIT:-1024M}
    update_config:
      parallelism: 1
      delay: 30s
      order: start-first
      failure_action: rollback
    restart_policy:
      condition: on-failure
      delay: 10s
      max_attempts: 3

##############
#
# Database Initialization:
# Run this command once to prepare the database:
# docker exec -it $(docker ps -q -f name=chatwoot_web) bundle exec rails db:chatwoot_prepare
#
# Environment Variables Documentation:
# https://www.chatwoot.com/docs/self-hosted/configuration/environment-variables
#
# Default Values:
# https://github.com/chatwoot/chatwoot/blob/develop/.env.example
#
#############

services:
  # Database preparation is handled by stacks/app/chatwoot/install.sh after deploy.
  chatwoot_web:
    <<: *chatwoot-common
    entrypoint: docker/entrypoints/rails.sh
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    # No Swarm healthcheck on purpose. The rails.sh entrypoint runs
    # `bundle install` + `bundle check` on every boot and Rails itself
    # then needs ~30-90 s to come up on a small VPS — Swarm's probes
    # were SIGKILLing healthy containers mid-boot. Traefik's external
    # backend probe on /health handles the user-facing health check.
    deploy:
      <<: *chatwoot-deploy
      resources:
        limits:
          cpus: "${CHATWOOT_WEB_CPU_LIMIT:-0.5}"
          memory: ${CHATWOOT_WEB_MEM_LIMIT:-768M}
      labels:
        # Traefik Configuration
        - traefik.enable=true
        - traefik.http.routers.chatwoot_web.rule=Host(`${CHATWOOT_HOST}`)
        - traefik.http.routers.chatwoot_web.entrypoints=websecure
        - traefik.http.routers.chatwoot_web.tls.certresolver=letsencryptresolver
        - traefik.http.routers.chatwoot_web.priority=2
        - traefik.http.routers.chatwoot_web.service=chatwoot_web
        - traefik.http.services.chatwoot_web.loadbalancer.server.port=3000
        - traefik.http.services.chatwoot_web.loadbalancer.passhostheader=true
        # SSL Headers Middleware
        - traefik.http.middlewares.chatwoot-sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.chatwoot_web.middlewares=chatwoot-sslheader@docker
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=chatwoot
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}

  # Background Job Processor
  chatwoot_sidekiq:
    <<: *chatwoot-common
    entrypoint: ["sh", "-c"]
    command:
      - |
        until wget -qO- http://chatwoot_web:3000 2>/dev/null; do sleep 3; done
        exec docker/entrypoints/rails.sh bundle exec sidekiq -C config/sidekiq.yml
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f sidekiq >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      <<: *chatwoot-deploy
      resources:
        limits:
          cpus: "${CHATWOOT_SIDEKIQ_CPU_LIMIT:-0.5}"
          memory: ${CHATWOOT_SIDEKIQ_MEM_LIMIT:-768M}

volumes:
  chatwoot_data:
    driver: local
  chatwoot_gems:
    driver: local

networks:
  network_public:
    external: true
    name: network_public
