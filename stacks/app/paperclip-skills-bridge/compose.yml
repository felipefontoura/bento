services:
  paperclip-skills-bridge:
    image: ghcr.io/felipefontoura/paperclip-skills-bridge:${BRIDGE_IMAGE_TAG:-0.1.0}
    # Stateless HTTP shim that translates Paperclip's company-skills API into
    # the .well-known/skills/ protocol the Hermes Agent already consumes.
    # Paperclip stays the source of truth; this bridge caches nothing.
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # =============================================================================
      # Upstream Paperclip — where the bridge fetches the catalog from.
      # =============================================================================

      # Internal Paperclip API endpoint. Override only if Paperclip lives in
      # a different overlay network.
      - PAPERCLIP_URL=${PAPERCLIP_URL:-http://paperclip:3100}

      # Paperclip company whose skills are served. Pulled from
      # state.providers.PAPERCLIP_COMPANY_ID via manifest.from_state.
      - PAPERCLIP_COMPANY_ID=${PAPERCLIP_COMPANY_ID}

      # Machine bearer the bridge presents to Paperclip's HTTP API. Pulled
      # from state.providers.PAPERCLIP_API_KEY via manifest.from_state.
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY}

      # =============================================================================
      # Bridge auth — what callers (the Paperclip adapter) must present.
      # =============================================================================

      # Generated by manifest. Required once the bridge is reachable beyond
      # this overlay network. The Paperclip adapter receives the same value
      # via its `skillsBridgeToken` adapter config field, wired by
      # stacks/app/paperclip/install.sh.
      - BRIDGE_AUTH_TOKEN=${BRIDGE_AUTH_TOKEN}

      # =============================================================================
      # Limits & timeouts
      # =============================================================================

      # Outbound timeout when calling Paperclip. Clamped to 500-60000 ms.
      - PAPERCLIP_FETCH_TIMEOUT_MS=${PAPERCLIP_FETCH_TIMEOUT_MS:-5000}

      # Per-IP rate limit on /.well-known/skills/*. /health is exempt.
      - BRIDGE_RATE_LIMIT_MAX=${BRIDGE_RATE_LIMIT_MAX:-100}
      - BRIDGE_RATE_LIMIT_WINDOW_MS=${BRIDGE_RATE_LIMIT_WINDOW_MS:-60000}
    # Swarm healthcheck intentionally omitted — Traefik's backend probe
    # already covers user-facing readiness and the bridge's own /health
    # endpoint stays public for ad-hoc curls.
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.http.routers.paperclip-skills-bridge.rule=Host(`${BRIDGE_HOST}`)
        - traefik.http.routers.paperclip-skills-bridge.entrypoints=websecure
        - traefik.http.routers.paperclip-skills-bridge.tls.certresolver=letsencryptresolver
        - traefik.http.routers.paperclip-skills-bridge.priority=2
        - traefik.http.routers.paperclip-skills-bridge.service=paperclip-skills-bridge
        - traefik.http.services.paperclip-skills-bridge.loadbalancer.server.port=8080
        - traefik.http.services.paperclip-skills-bridge.loadbalancer.passHostHeader=true
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=paperclip-skills-bridge
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}

networks:
  network_public:
    name: network_public
    external: true
