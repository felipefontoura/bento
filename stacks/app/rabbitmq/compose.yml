services:
  rabbitmq:
    image: rabbitmq:3-management
    entrypoint: docker-entrypoint.sh
    command: rabbitmq-server
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # AMQP port (5672) is overlay-only — apps connect as host `rabbitmq`.
    # The management UI (15672) is reached over HTTPS via Traefik.
    hostname: rabbitmq
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq/
    environment:
      # =============================================================================
      # Clustering / Erlang
      # =============================================================================

      # Shared secret used for node authentication in a cluster.
      # MUST be identical across all nodes in the same cluster.
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE}

      # =============================================================================
      # Virtual Host / Default User
      # =============================================================================

      # Default virtual host created on first startup.
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_DEFAULT_VHOST:-default}

      # Default admin user.
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-rabbitmq}

      # Default admin password.
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      # Stateful: avoid running two rabbitmq tasks against the same
      # volume at the same time during a rolling update.
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "1"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.rabbitmq.rule=Host(`${RABBITMQ_HOST}`)
        - traefik.http.routers.rabbitmq.entrypoints=websecure
        - traefik.http.routers.rabbitmq.tls.certresolver=letsencryptresolver
        - traefik.http.routers.rabbitmq.priority=2
        - traefik.http.routers.rabbitmq.service=rabbitmq
        - traefik.http.services.rabbitmq.loadbalancer.server.port=15672
        - traefik.http.services.rabbitmq.loadbalancer.passHostHeader=true
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=rabbitmq
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}
networks:
  network_public:
    name: network_public
    external: true
volumes:
  rabbitmq-data:
    driver: local
