# Crawl4AI runtime config — MANAGED BY BENTO.
#
# Seeded into the persistent `crawl4ai-config` volume by install.sh and copied
# onto /app/config.yml at container boot (see compose.yml command). crawl4ai
# reads /app/config.yml from a hardcoded path with NO env override for the pool
# knobs, so a file is the only lever.
#
# This is the upstream config.yml with three values tuned for a small VPS — see
# the "Crawler Configuration" block below. Everything else mirrors the image
# defaults; keep in sync when bumping the image.

# Application Configuration
app:
  title: "Crawl4AI API"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 11235
  reload: False
  workers: 1
  timeout_keep_alive: 300

# Default LLM Configuration
llm:
  provider: "openai/gpt-4o-mini"

# Redis Configuration
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""
  task_ttl_seconds: 3600
  ssl: False
  ssl_cert_reqs: None
  ssl_ca_certs: None
  ssl_certfile: None
  ssl_keyfile: None

# Rate Limiting Configuration
rate_limiting:
  enabled: True
  default_limit: "1000/minute"
  trusted_proxies: []
  storage_uri: "memory://"

# Security Configuration
security:
  enabled: false
  jwt_enabled: false
  api_token: ""
  https_redirect: false
  trusted_hosts: ["*"]
  headers:
    x_content_type_options: "nosniff"
    x_frame_options: "DENY"
    content_security_policy: "default-src 'self'"
    strict_transport_security: "max-age=63072000; includeSubDomains"

# Crawler Configuration
crawler:
  base_config:
    simulate_user: true
  # BENTO TUNED (was 95.0): pause dispatch of new crawls at 70% host RAM so the
  # adaptive dispatcher applies backpressure BEFORE the kernel OOM-killer fires
  # on a tight VPS.
  memory_threshold_percent: 70.0
  rate_limiter:
    enabled: true
    base_delay: [1.0, 2.0]
  timeouts:
    stream_init: 30.0
    batch_process: 300.0
  pool:
    # BENTO TUNED (was 40): global semaphore — at most 2 headless Chromium pages
    # at once. Excess requests QUEUE instead of all launching in parallel, which
    # is what OOM-killed the host. Drop to 1 for maximum safety.
    max_pages: 2
    # BENTO TUNED (was 300): reap idle browser pages after 60s so memory is
    # released quickly between crawl bursts instead of lingering 5 minutes.
    idle_ttl_sec: 60
  browser:
    kwargs:
      headless: true
      text_mode: true
    extra_args:
      - "--no-sandbox"
      - "--disable-dev-shm-usage"
      - "--disable-gpu"
      - "--disable-software-rasterizer"
      - "--allow-insecure-localhost"
      - "--ignore-certificate-errors"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Observability Configuration
observability:
  prometheus:
    enabled: True
    endpoint: "/metrics"
  health_check:
    endpoint: "/health"

# Webhook Configuration
webhooks:
  enabled: true
  default_url: null
  data_in_payload: false
  retry:
    max_attempts: 5
    initial_delay_ms: 1000
    max_delay_ms: 32000
    timeout_ms: 30000
  headers:
    User-Agent: "Crawl4AI-Webhook/1.0"
