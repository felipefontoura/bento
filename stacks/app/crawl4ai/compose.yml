services:
  crawl4ai:
    # Pinned by digest (= crawl4ai 0.8.9), NOT :latest. The :latest tag moved
    # under us and started requiring a REDIS_PASSWORD env its supervisord.conf
    # could not expand (`%(ENV_REDIS_PASSWORD)s`), crash-looping the container.
    # Pin to a known-good build; bump the digest deliberately and re-sync
    # config.yml when you upgrade.
    image: unclecode/crawl4ai@sha256:b243f684ad20f71ee108ab3fc3f31f3349eb5b31a9947b9e563d868417141aad
    networks:
      - network_public
    # Queue mode. crawl4ai reads /app/config.yml from a hardcoded path and has
    # NO env override for the pool/memory knobs (verified in 0.8.9: server.py
    # reads config["crawler"]["pool"]["max_pages"] straight from the file). The
    # stock config ships max_pages=40 — 40 concurrent headless Chromium pages
    # OOM-kill a small VPS. So we ship a queue-tuned config.yml (max_pages=2,
    # memory_threshold=70, idle_ttl=60) in the persistent crawl4ai-config volume
    # (seeded by install.sh) and copy it onto /app/config.yml at boot.
    #
    # Override the command to copy the config, then run the image's start command
    # (supervisord). A decorator entrypoint (`exec "$@"`) is NOT usable here:
    # Compose CLEARS the image CMD when `entrypoint:` is set, so `$@` would be
    # empty and the container exits. Hardcoding `supervisord -c supervisord.conf`
    # is safe because the image is pinned by digest above — the CMD only changes
    # when we deliberately bump the pin, and we re-check it then. Image
    # ENTRYPOINT is null and WORKDIR is /app.
    command:
      - /bin/sh
      - -c
      - |
        cp /bootstrap/config.yml /app/config.yml 2>/dev/null \
          || echo "[bento] crawl4ai-config not seeded yet — using image default config"
        exec supervisord -c supervisord.conf
    volumes:
      # Chromium shared memory. The default 64M container /dev/shm makes
      # headless Chrome crash on large pages — bind the host's (RAM-backed)
      # /dev/shm so the browser has room. This is the upstream pattern.
      - /dev/shm:/dev/shm
      # Persistent queue-tuned config.yml, seeded by install.sh and copied onto
      # /app/config.yml by the command above. Read-only mount — edits go
      # through the repo's config.yml + redeploy, or into the volume + restart.
      - crawl4ai-config:/bootstrap:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # =============================================================================
      # Core Application
      # =============================================================================

      # Internal-only deployment (no public Traefik route). The n8n search MCP
      # reaches it over the overlay at http://crawl4ai:11235.
      #
      # No CRAWL4AI_API_TOKEN — access is internal, on the private overlay only.
      # No LLM provider keys — extraction uses the heuristic "fit" markdown
      # path (clean main content), not LLM-based extraction.
      - PORT=11235

      # =============================================================================
      # Optional outbound proxy
      # =============================================================================
      # Datacenter IPs (Hetzner et al.) get blocked by anti-bot on many sites
      # (HTTP 403 "Blocked by anti-bot protection") regardless of fingerprint.
      # Route the headless Chromium through a residential/mobile proxy by setting
      # CRAWL4AI_PROXY in bento state (blank = direct egress, no proxy — the
      # default, so operators without a proxy are unaffected). Crawl4AI has no
      # documented global proxy; HTTP(S)_PROXY is the pragmatic lever Linux
      # Chromium honors. Both cases set (Chromium/curl/wget differ); NO_PROXY
      # keeps overlay-internal traffic direct. See docs/reference/crawl4ai-proxy.md.
      - HTTP_PROXY=${CRAWL4AI_PROXY:-}
      - HTTPS_PROXY=${CRAWL4AI_PROXY:-}
      - http_proxy=${CRAWL4AI_PROXY:-}
      - https_proxy=${CRAWL4AI_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1,searxng,metamcp,postgres,redis
      - no_proxy=localhost,127.0.0.1,searxng,metamcp,postgres,redis
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 180s
      resources:
        # Heavy (headless Chromium). Capped at 1.5G; the host now has 4G swap
        # as a backstop for crawl spikes. Reservations dropped on purpose so a
        # tight VPS can still schedule it. Queue mode (max_pages=2) keeps the
        # real footprint well under this cap.
        limits:
          cpus: "1.5"
          memory: 1536M
      labels:
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=crawl4ai
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}

networks:
  network_public:
    name: network_public
    external: true

volumes:
  crawl4ai-config:
    driver: local
