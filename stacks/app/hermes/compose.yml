# =============================================================================
# Hermes — local-binary provider sidecar
# =============================================================================
#
# OVERLAY-ONLY. No Traefik route, no host port, no HTTP gateway. The container
# exists solely to seed the `hermes-bin` named volume with the `/opt/hermes`
# tree from the upstream `nousresearch/hermes-agent` image, so peer containers
# (typically paperclip) can mount that volume read-only and invoke the Hermes
# CLI as a local subprocess via Paperclip's `hermes_local` adapter.
#
# How the seeding works:
#   - On the FIRST start, Docker copies the contents of `/opt/hermes` from
#     the image into the empty `hermes-bin` named volume (named-volume
#     seeding behaviour).
#   - The container then sleeps forever — it does NOT run the Hermes gateway.
#     We only need the bytes on disk, not a long-lived process.
#   - To upgrade Hermes: `docker volume rm <stack>_hermes-bin` then redeploy.
#     This forces a fresh seed from the (now-pulled) newer image.
#
# `/opt/hermes/.venv/bin/python3` is the embedded Python interpreter, so the
# tree is self-contained — the peer container does NOT need Python or any
# Hermes deps installed; it just needs the volume mounted.
# =============================================================================

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    # Override the image entrypoint completely. The default s6-overlay /init
    # would try to start the gateway, write to /opt/hermes (mutating the
    # volume), and run as the `hermes` user. We need none of that — pure
    # binary provider, idle process.
    entrypoint: ["sleep", "infinity"]
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # Named-volume seeding: on first mount the image's /opt/hermes tree is
      # copied into this empty volume. Subsequent boots reuse the volume as-is
      # (so upgrades require an explicit volume wipe + redeploy).
      - hermes-bin:/opt/hermes
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

volumes:
  hermes-bin:
    driver: local

networks:
  network_public:
    external: true
    name: network_public
