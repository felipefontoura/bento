services:
  hermes:
    image: nousresearch/hermes-agent:${HERMES_IMAGE_TAG:-latest}
    # OpenAI-compatible HTTP gateway. Consumed by Paperclip via the npm package
    # `@felipefontoura/paperclip-adapter-hermes-gateway`, installed at deploy time
    # by stacks/app/paperclip/install.sh.
    command: ["gateway", "run"]
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # =============================================================================
      # API Server (Hermes' built-in OpenAI-compatible HTTP gateway)
      # =============================================================================

      # Turn the API server on. Without this Hermes only exposes the CLI.
      - API_SERVER_ENABLED=true

      # Listen on every interface inside the overlay network.
      - API_SERVER_HOST=0.0.0.0

      # 0o755 lets the paperclip stack's cross-stack RO mount traverse
      # /opt/data so its hermes_local plugin can read config.yaml + auth.json
      # without chasing perms after every restart. Hermes itself respects
      # this via hermes_cli/config.py (HERMES_HOME_MODE env hook).
      - HERMES_HOME_MODE=0755

      # Internal port. Traefik fronts it on the public side.
      - API_SERVER_PORT=8642

      # Bearer required by every /v1/* call. Generated by manifest.
      - API_SERVER_KEY=${HERMES_API_KEY}

      # Display name returned by GET /v1/models. Override per-tenant via the
      # Paperclip agent's Model field.
      - API_SERVER_MODEL_NAME=${HERMES_MODEL_NAME:-hermes-agent}

      # =============================================================================
      # Provider keys — interpolated into /opt/data/config.yaml at install time.
      # Every entry below is optional: Hermes silently ignores providers whose
      # api_key is empty, so leaving a key unset just disables that provider.
      # Resolution comes from state.providers via manifest.from_state.
      # =============================================================================

      # Built-in providers (Hermes recognises these by name natively).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}

      # Custom providers (declared as `custom_providers:` in config.yaml).
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
    volumes:
      # config.yaml lives inside this volume at /opt/data/config.yaml; the
      # install.sh of this stack writes it via `docker exec` after the
      # service is up, interpolating the provider keys above. The volume
      # also persists Hermes' on-disk caches (skills, model metadata)
      # across upgrades.
      - hermes-data:/opt/data
      # The hermes Python runtime + binary ship inside the image at
      # /opt/hermes. Docker's named-volume-init copies that path's contents
      # into this empty volume on first start, so the paperclip stack can
      # mount the same volume RO and exec the hermes binary as a subprocess
      # — no separate copy-sidecar needed.
      - hermes-bin:/opt/hermes
    # Swarm healthcheck intentionally omitted — Hermes' first boot pre-warms
    # provider clients which can blow the probe window on small VPS. Traefik's
    # backend health check covers user-facing readiness.
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.http.routers.hermes.rule=Host(`${HERMES_HOST}`)
        - traefik.http.routers.hermes.entrypoints=websecure
        - traefik.http.routers.hermes.tls.certresolver=letsencryptresolver
        - traefik.http.routers.hermes.priority=2
        - traefik.http.routers.hermes.service=hermes
        - traefik.http.services.hermes.loadbalancer.server.port=8642
        - traefik.http.services.hermes.loadbalancer.passHostHeader=true
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=hermes
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}

networks:
  network_public:
    name: network_public
    external: true

volumes:
  hermes-data:
    driver: local
  # Cross-stack mounted RO into the paperclip service. Populated by
  # Docker's named-volume-init from the image's /opt/hermes on first boot.
  hermes-bin:
    driver: local
