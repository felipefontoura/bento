# Hermes — local-binary provider sidecar (overlay-only, idle).
#
# Seeds the `hermes-bin` named volume with the upstream image's /opt/hermes
# tree (Python venv + Hermes CLI), then sleeps. Peer containers mount the
# volume read-only and call /opt/hermes/bin/hermes as a local subprocess
# via Paperclip's `hermes_local` adapter — graft is wired by install.sh
# on either side (see lib/install-helpers.sh::graft_external_volume_to_service).
#
# Upgrade: `docker volume rm <stack>_hermes-bin && docker stack deploy hermes`.

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    # Override image entrypoint — no gateway, no s6 init, no /opt/hermes writes.
    entrypoint: ["sleep", "infinity"]
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # Named-volume seeding: empty volume + image path with content → Docker
      # copies the tree on first mount. Subsequent boots reuse the volume.
      - hermes-bin:/opt/hermes
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
      labels:
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=hermes
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}

volumes:
  hermes-bin:
    driver: local

networks:
  network_public:
    external: true
    name: network_public
