services:
  hermes:
    image: nousresearch/hermes-agent:${HERMES_IMAGE_TAG:-latest}
    # `gateway run` inside the s6-overlay image supervises in parallel:
    # the OpenAI-compatible API HTTP gateway (port 8642) and the dashboard
    # web UI (port 9119, when HERMES_DASHBOARD=1). The CLI is reachable
    # interactively via `docker exec -it <container> hermes <subcommand>`
    # — the image's wrapper routes argument passthrough to `hermes`.
    command: ["gateway", "run"]
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # =============================================================================
      # API gateway (OpenAI-compatible HTTP server on :8642)
      # =============================================================================
      # External consumers call /v1/chat/completions with
      # Authorization: Bearer ${HERMES_API_KEY}.
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${HERMES_API_KEY}
      - API_SERVER_MODEL_NAME=${HERMES_MODEL_NAME:-hermes-agent}

      # =============================================================================
      # Dashboard (web UI on :9119, s6-supervised when truthy)
      # =============================================================================
      # Operator credentials: user "admin" + auto-generated
      # HERMES_DASHBOARD_PASSWORD. Read it from state.json (envs.hermes) or
      # the bento report. `HERMES_DASHBOARD_INSECURE=1` permits 0.0.0.0 bind;
      # Traefik's basicauth middleware below is the public-side gate.
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_INSECURE=1

      # =============================================================================
      # Cross-stack readable home — UID/GID alignment with paperclip
      # =============================================================================
      # The paperclip container's `node` user runs as uid 1000 / gid 1000.
      # The hermes daemon writes /opt/data/config.yaml as 0640 owner=hermes:hermes
      # and `/opt/hermes/docker/stage2-hook.sh` chmods it back to 0640 on every
      # boot, so a paperclip-side `chmod 0644` would not survive. Two envs fix
      # this without touching file modes:
      #
      #   HERMES_GID=1000  → remaps the hermes group's gid to 1000, so config.yaml's
      #                      group bit (rw-r-----) is readable by paperclip's `node`
      #                      (which is gid 1000). Survives container restart and
      #                      every future dashboard config write.
      #   HERMES_HOME_MODE=0755 → opens /opt/data dir traversal for the cross-stack
      #                      RO mount (default 0700 blocks it).
      - HERMES_GID=1000
      - HERMES_HOME_MODE=0755
    volumes:
      # Dashboard + gateway state (config, sessions, messaging registrations).
      - hermes-data:/opt/data
      # Cross-stack: paperclip mounts this RO to spawn `hermes chat` via the
      # hermes_local adapter plugin. Docker's named-volume-init copies the
      # image's /opt/hermes into this volume on first boot.
      - hermes-bin:/opt/hermes
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "${HERMES_CPU_LIMIT:-1}"
          # Headroom for gateway HTTP server + dashboard (first boot may
          # build the web UI) + Telegram polling concurrently.
          memory: ${HERMES_MEM_LIMIT:-1024M}
      labels:
        - traefik.enable=true
        # --- Dashboard route (Basic Auth via htpasswd) ---
        - traefik.http.routers.hermes-dashboard.rule=Host(`${HERMES_HOST}`)
        - traefik.http.routers.hermes-dashboard.entrypoints=websecure
        - traefik.http.routers.hermes-dashboard.tls.certresolver=letsencryptresolver
        - traefik.http.routers.hermes-dashboard.priority=2
        - traefik.http.routers.hermes-dashboard.service=hermes-dashboard
        - traefik.http.routers.hermes-dashboard.middlewares=hermes-auth
        - traefik.http.services.hermes-dashboard.loadbalancer.server.port=9119
        - traefik.http.services.hermes-dashboard.loadbalancer.passHostHeader=true
        # --- Dashboard WebSocket route (NO basicauth; SPA-token in `?token=`) ---
        # Chrome does NOT forward cached basic-auth credentials on a WebSocket
        # upgrade, so a single basicauth-gated router 401s every WS the SPA
        # tries to open (/api/ws, /api/events, /api/pty, /api/pub) and the
        # Chat/Logs/Cron pages hang on a perpetual "connecting…" or close with
        # 1006. These endpoints already require `?token=<_SESSION_TOKEN>` —
        # the same token only obtainable by loading the HTML through the
        # basicauth gate above — so the layered model holds: basicauth keeps
        # outsiders from ever discovering the token, the token enforces auth on
        # the WS upgrade. Higher priority so it wins the longest-prefix race
        # against hermes-dashboard.
        - traefik.http.routers.hermes-ws.rule=Host(`${HERMES_HOST}`) && (PathPrefix(`/api/ws`) || PathPrefix(`/api/events`) || PathPrefix(`/api/pty`) || PathPrefix(`/api/pub`))
        - traefik.http.routers.hermes-ws.entrypoints=websecure
        - traefik.http.routers.hermes-ws.tls.certresolver=letsencryptresolver
        - traefik.http.routers.hermes-ws.priority=10
        - traefik.http.routers.hermes-ws.service=hermes-dashboard
        # --- API gateway route (Bearer auth via API_SERVER_KEY, native) ---
        - traefik.http.routers.hermes-api.rule=Host(`${HERMES_API_HOST}`)
        - traefik.http.routers.hermes-api.entrypoints=websecure
        - traefik.http.routers.hermes-api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.hermes-api.priority=2
        - traefik.http.routers.hermes-api.service=hermes-api
        - traefik.http.services.hermes-api.loadbalancer.server.port=8642
        - traefik.http.services.hermes-api.loadbalancer.passHostHeader=true
        # --- Basic Auth middleware (dashboard only) ---
        - traefik.http.middlewares.hermes-auth.basicauth.users=${HERMES_DASHBOARD_HTPASSWD}
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=hermes
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}

networks:
  network_public:
    name: network_public
    external: true

volumes:
  hermes-data:
    driver: local
  # Cross-stack mounted RO into the paperclip service. Populated by
  # Docker's named-volume-init from the image's /opt/hermes on first boot.
  hermes-bin:
    driver: local
