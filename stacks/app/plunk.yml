services:
  plunk:
    image: driaug/plunk:latest
    entrypoint: ["/app/entry.sh"]
    networks:
      - network_public
    environment:
      # =============================================================================
      # Public URLs / API
      # =============================================================================

      # Base application URI.
      - APP_URI=https://plunk.website.com

      # API endpoint URI.
      - API_URI=https://plunk.website.com/api

      # Public-facing API URI exposed to the frontend.
      - NEXT_PUBLIC_API_URI=https://plunk.website.com/api

      # =============================================================================
      # Database (PostgreSQL)
      # =============================================================================

      # Full database connection URL.
      - DATABASE_URL=postgresql://plunk:secret@postgres:5432/plunk

      # =============================================================================
      # Cache / Queue (Redis)
      # =============================================================================

      # Redis connection URL (DB index 2).
      - REDIS_URL=redis://redis:6379/2

      # =============================================================================
      # Security
      # =============================================================================

      # JWT signing secret. MUST remain stable across restarts/upgrades.
      - JWT_SECRET=secret

      # =============================================================================
      # Email (AWS SES)
      # =============================================================================

      # AWS region where SES is configured.
      - AWS_REGION=us-east-1

      # AWS access key for SES.
      - AWS_ACCESS_KEY_ID=access-key

      # AWS secret key for SES.
      - AWS_SECRET_ACCESS_KEY=secret-key

      # AWS SES configuration set name.
      - AWS_SES_CONFIGURATION_SET=config-set

      # =============================================================================
      # Account Management
      # =============================================================================

      # Disable public signups.
      - DISABLE_SIGNUPS=true
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.http.routers.plunk.rule=Host(`plunk.website.com`)
        - traefik.http.routers.plunk.entrypoints=websecure
        - traefik.http.routers.plunk.tls.certresolver=letsencryptresolver
        - traefik.http.routers.plunk.priority=2
        - traefik.http.routers.plunk.service=plunk
        - traefik.http.services.plunk.loadbalancer.server.port=3000
        - traefik.http.services.plunk.loadbalancer.passHostHeader=true
networks:
  network_public:
    name: network_public
    external: true
