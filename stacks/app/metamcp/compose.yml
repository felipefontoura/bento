services:
  metamcp:
    image: ghcr.io/metatool-ai/metamcp:latest
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # =============================================================================
      # Core Application
      # =============================================================================

      # Runtime environment.
      - NODE_ENV=production

      # Log verbosity: all | info | errors-only | none
      - LOG_LEVEL=errors-only

      # =============================================================================
      # Public URLs / Reverse Proxy
      # =============================================================================

      # Public base URL. Used by Better Auth callbacks, the web UI, and the
      # generated MCP endpoint URLs. Avoid a trailing slash.
      - APP_URL=https://${METAMCP_HOST}

      # Frontend-visible copy of APP_URL (baked into the Next.js client).
      - NEXT_PUBLIC_APP_URL=https://${METAMCP_HOST}

      # =============================================================================
      # Database (PostgreSQL)
      # =============================================================================
      # Reuses the shared `postgres` stack. The `metamcp` database is created by
      # install.sh; MetaMCP runs its own Drizzle migrations on first start.

      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=metamcp

      # Connection string composed from the values above.
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/metamcp

      # =============================================================================
      # Security / Authentication
      # =============================================================================

      # Better Auth signing secret. MUST remain stable across restarts/upgrades
      # or all sessions are invalidated.
      - BETTER_AUTH_SECRET=${METAMCP_BETTER_AUTH_SECRET}

      # =============================================================================
      # First admin & public signup
      # =============================================================================
      # No admin is auto-created. On first visit MetaMCP's signup page is OPEN:
      # the first person to register becomes the admin. Public signup stays ON
      # until you turn it OFF in MetaMCP -> Settings -> "Disable signup" (the
      # toggle is persisted in the database). Register your admin right after
      # deploy, then disable signup so the public endpoint can't be self-registered.
      #
      # (MetaMCP's BOOTSTRAP_* env auto-admin feature is intentionally NOT used:
      # it landed on main after, and is absent from, every published Docker image
      # as of this writing — so the env vars would be silently ignored.)

      # =============================================================================
      # Docker Networking
      # =============================================================================

      # Rewrites `localhost` MCP targets to `host.docker.internal` so stdio MCP
      # servers MetaMCP spawns can reach host-bound services.
      - TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL=true

    # Persistent named volumes.
    #
    #  metamcp-secrets -> /secrets
    #    Credential files (service-account JSON, OAuth tokens) that stdio MCP
    #    servers read. MetaMCP does NOT propagate the service-level env to the
    #    children it spawns, so each server points at these mounted files
    #    through its OWN per-server env (e.g. set, in the MetaMCP UI for that
    #    server, GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-sa.json). Mounted
    #    read-write because OAuth-based servers refresh and rewrite their token
    #    file here. Operator-populated (empty by default) and persists across
    #    redeploys.
    #
    #  metamcp-uv-cache -> ~/.cache/uv, metamcp-npm-cache -> ~/.npm
    #    Persist uvx/npx package downloads across restarts. Without this every
    #    redeploy re-downloads each stdio server's package on first spawn, which
    #    overruns MetaMCP's single connect attempt and parks the server in an
    #    ERROR state. install.sh chowns all three to the image's non-root uid.
    volumes:
      - metamcp-secrets:/secrets
      - metamcp-uv-cache:/home/nextjs/.cache/uv
      - metamcp-npm-cache:/home/nextjs/.npm
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "1"
          # Headroom for the persistent package cache plus the several concurrent
          # stdio MCP subprocesses (python/node) MetaMCP spawns and keeps warm.
          memory: 1700M
      # Swarm healthcheck intentionally omitted (bento convention) — Next.js SSR
      # boot on a small VPS trips wget/start_period probes and SIGKILLs healthy
      # containers. Traefik's backend health check covers user-facing readiness.
      labels:
        - traefik.enable=true
        - traefik.http.routers.metamcp.rule=Host(`${METAMCP_HOST}`)
        - traefik.http.routers.metamcp.entrypoints=websecure
        - traefik.http.routers.metamcp.tls.certresolver=letsencryptresolver
        - traefik.http.routers.metamcp.service=metamcp
        - traefik.http.services.metamcp.loadbalancer.server.port=12008
        - traefik.http.services.metamcp.loadbalancer.passHostHeader=true
        # Bento management labels — let introspection tooling find this service
        # via `docker service ls --filter label=BENTO_MANAGED=true`.
        - BENTO_MANAGED=true
        - BENTO_STACK_KEY=metamcp
        - BENTO_DEPLOYED_REF=${BENTO_DEPLOYED_REF:-unknown}

volumes:
  metamcp-secrets:
    driver: local
  metamcp-uv-cache:
    driver: local
  metamcp-npm-cache:
    driver: local

networks:
  network_public:
    name: network_public
    external: true
