services:
  traefik:
    image: traefik:v2.11
    # ACME challenge is selected at deploy time by lib/infra.sh:
    #   - default → HTTP-01 (needs port 80 reachable on the VPS)
    #   - CF_DNS_API_TOKEN set → DNS-01 via Cloudflare (works through
    #     the orange-cloud proxy and on private VPS where 80/443 are
    #     restricted). lib/infra.sh swaps the challenge flags via
    #     ${TRAEFIK_ACME_CHALLENGE_*} placeholders below.
    command:
      - "--api.dashboard=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=network_public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "${TRAEFIK_ACME_CHALLENGE_FLAG_1}"
      - "${TRAEFIK_ACME_CHALLENGE_FLAG_2}"
      - "--certificatesresolvers.letsencryptresolver.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsencryptresolver.acme.storage=/etc/traefik/letsencrypt/acme.json"
      - "--log.level=DEBUG"
      - "--log.format=common"
      - "--log.filePath=/var/log/traefik/traefik.log"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access-log"
      - "--ping=true"
    environment:
      # Empty when HTTP-01 is in use; bento exports it before envsubst.
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/ping >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
        - "traefik.http.routers.http-catchall.rule=hostregexp(`{host:.+}`)"
        - "traefik.http.routers.http-catchall.entrypoints=web"
        - "traefik.http.routers.http-catchall.middlewares=redirect-https@docker"
        - "traefik.http.routers.http-catchall.priority=1"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "vol_certificates:/etc/traefik/letsencrypt"
    networks:
      - network_public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
volumes:
  vol_certificates:
    driver: local
networks:
  network_public:
    external: true
    name: network_public
