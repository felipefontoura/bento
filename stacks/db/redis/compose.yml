services:
  redis:
    image: redis:7
    command: redis-server --appendonly yes --port 6379
    networks:
      - network_public
    # Internal-only: apps reach redis via the overlay as host `redis`.
    # SSH-tunnel from your laptop for ad-hoc redis-cli access in dev.
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
networks:
  network_public:
    external: true
    name: network_public
volumes:
  redis-data:
    driver: local
