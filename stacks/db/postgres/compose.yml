services:
  postgres:
    image: postgres:15
    entrypoint: docker-entrypoint.sh
    command: [postgres, --max_connections=200]
    networks:
      - network_public
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS="--auth-host=scram-sha-256"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  network_public:
    external: true
    name: network_public
volumes:
  postgres-data:
    driver: local
