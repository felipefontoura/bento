x-postgres-common: &postgres-common
  image: postgres:15
  networks:
    - network_public
  environment:
    - POSTGRES_PASSWORD=secret
    - POSTGRES_INITDB_ARGS="--auth-host=scram-sha-256"
    - POSTGRES_INIT_DATABASES=sandbox,n8n,typebot,plunk,chatwoot,evolution,paperclip
  deploy: &postgres-deploy
    mode: replicated
    replicas: 1
    placement:
      constraints:
        - node.role == manager

services:
  postgres:
    <<: *postgres-common
    entrypoint: docker-entrypoint.sh
    command: [postgres, --max_connections=200]
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      <<: *postgres-deploy
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
  postgres-init:
    <<: *postgres-common
    entrypoint: ["sh", "-c"]
    command:
      - |
        export PGPASSWORD="$${POSTGRES_PASSWORD}"
        until pg_isready -h postgres -U postgres; do
          echo "Waiting for postgres..."
          sleep 2
        done
        IFS="," read -ra DBS <<< "$${POSTGRES_INIT_DATABASES}"
        for db in "$${DBS[@]}"; do
          echo "Ensuring database exists: $$db"
          psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = '$$db'" | grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE \"$$db\""
        done
        echo "All databases ready"
    deploy:
      <<: *postgres-deploy
      restart_policy:
        condition: on-failure

networks:
  network_public:
    external: true
    name: network_public
volumes:
  postgres-data:
    driver: local
